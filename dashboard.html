<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CEDAPSA Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}

.header img {
  width: 50px;
}

.admin {
  background: #22c55e;
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 12px;
}

.user {
  background: #3b82f6;
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 12px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://media.licdn.com/dms/image/v2/C4E0BAQHQU86COt-8pw/company-logo_200_200/company-logo_200_200/0/1630611831751/cedapsa_mx_logo?e=2147483647&v=beta&t=Mbt4yKIoqvPVNZUD6V8PBP_imBDZOxIEva4Az4voYyA">
  <h2>CEDAPSA Dashboard</h2>
  <span id="rol"></span>
</div>

<div id="contenido"></div>

<script>
const supabase = window.supabase.createClient(
  "TU_URL",
  "TU_API_KEY"
);

async function cargarPerfil() {

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const { data: perfil } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  const rolDiv = document.getElementById("rol");
  const contenido = document.getElementById("contenido");

  if (perfil.rol === "admin") {
    rolDiv.innerHTML = '<span class="admin">ADMIN 👑</span>';

    contenido.innerHTML = `
      <div class="card">
        <h3>Panel Admin</h3>
        <p>Puedes ver todos los tickets</p>
      </div>
    `;

  } else {
    rolDiv.innerHTML = '<span class="user">USUARIO 👤</span>';

    contenido.innerHTML = `
      <div class="card">
        <h3>Panel Usuario</h3>
        <p>Solo ves tus tickets</p>
      </div>
    `;
  }
}

cargarPerfil();
</script>

</body>
</html>
