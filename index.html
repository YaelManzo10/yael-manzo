<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CEDAPSA PRO</title>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
.container { max-width:600px; margin:auto; }

input { padding:10px; margin:5px; width:100%; }
button { padding:10px; margin:5px; cursor:pointer; }

.ticket {
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>

<hr>

<div id="app" style="display:none;">

<h2>Tickets</h2>

<input id="txt" placeholder="Descripción">
<button onclick="crear()">Crear</button>

<div id="lista"></div>

</div>

</div>

<script>
const URL = "https://hovpsbjewyqoaobtxdie.supabase.co/rest/v1/tickets";
const APIKEY = "sb_publishable_LFWYygez_5LNBgO2uFYGUQ_FDxAkrRT";

let user = null;

async function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const res = await fetch("https://hovpsbjewyqoaobtxdie.supabase.co/auth/v1/token?grant_type=password", {
    method: "POST",
    headers: {
      "apikey": APIKEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: email,
      password: pass
    })
  });

  const data = await res.json();

  if (data.access_token) {
    user = data;
    document.getElementById("app").style.display = "block";
    cargar();
  } else {
    alert("Error login");
  }
}

async function crear() {
  const txt = document.getElementById("txt").value;

  await fetch(URL, {
    method: "POST",
    headers: {
      "apikey": APIKEY,
      "Authorization": "Bearer " + user.access_token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ descripcion: txt })
  });

  cargar();
}

async function cargar() {
  const res = await fetch(URL + "?select=*", {
    headers: {
      "apikey": APIKEY,
      "Authorization": "Bearer " + user.access_token
    }
  });

  const data = await res.json();

  document.getElementById("lista").innerHTML =
    data.map(t => `<div class="ticket">${t.descripcion} - ${t.estatus}</div>`).join("");
}
</script>

</body>
</html>
