<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CEDAPSA</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  background:#0f172a;
  font-family:Segoe UI;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  margin:10px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <img src="https://i.imgur.com/7kQEsHU.png" width="80">
  <h2>CEDAPSA</h2>

  <input id="email" placeholder="Correo">
  <input id="pass" type="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>
  <button onclick="register()">Crear cuenta</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "TU_URL",
  "TU_API_KEY"
);

async function login(){
  const email = emailInput.value;
  const password = pass.value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error) return alert(error.message);

  location.href="dashboard.html";
}

async function register(){
  const email = emailInput.value;
  const password = pass.value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if(error) return alert(error.message);

  alert("Cuenta creada");
}
</script>

</body>
</html>
