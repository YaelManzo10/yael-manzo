<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CEDAPSA Maintenance</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="font-family: Arial; padding: 20px">

<h1>CEDAPSA Maintenance</h1>

<input id="txt" placeholder="Descripción">
<button onclick="crear()">Crear Ticket</button>

<hr>

<div id="lista"></div>

<script>
const supabase = window.supabase.createClient(
  "https://hovpsbjewyqaoobtxdie.supabase.co",
  "sb_publishable_LFWYygez_5LNBgO2uFYGUQ_FDxAkrRT"
);

// CREAR
async function crear() {
  const txt = document.getElementById("txt").value;

  if (!txt) return;

  const { error } = await supabase.from("Entradas").insert([
    { descripcion: txt }
  ]);

  if (error) {
    console.log(error);
    alert("Error al guardar");
  }

  document.getElementById("txt").value = "";
  cargar();
}

// CARGAR
async function cargar() {
  const { data, error } = await supabase.from("Entradas").select("*");

  console.log(data, error);

  if (error) {
    alert("Error al cargar");
    return;
  }

  document.getElementById("lista").innerHTML =
    data.map(t => `<p>${t.descripcion} - ${t.estatus}</p>`).join("");
}

// INICIO
cargar();
</script>

</body>
</html>
