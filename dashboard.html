<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: 'Segoe UI';
  background: #0f172a;
  color: white;
  padding: 20px;
}
input, select {
  padding: 10px;
  border-radius: 8px;
  border: none;
}
button {
  padding: 10px;
  background: #3b82f6;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}
.card {
  background: #1e293b;
  margin: 10px 0;
  padding: 15px;
  border-radius: 10px;
}
.pendiente { background: orange; }
.proceso { background: blue; }
.terminado { background: green; }
</style>
</head>

<body>

<h1>📊 CEDAPSA Dashboard</h1>

<button onclick="logout()">Salir</button>

<hr>

<input id="txt" placeholder="Problema">
<input type="file" id="foto">
<button onclick="crear()">Crear Ticket</button>

<h2>Tickets</h2>
<div id="lista"></div>

<script>
const SUPABASE_URL = "https://TU_PROYECTO.supabase.co";
const SUPABASE_KEY = "TU_API_KEY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user;
let admin = false;

// 🔐 validar sesión
async function init() {
  const res = await supabase.auth.getUser();

  if (!res.data.user) {
    window.location.href = "/yael-manzo/index.html";
    return;
  }

  user = res.data.user;

  // 👑 define admin
  if (user.email === "tu_correo@empresa.com") {
    admin = true;
  }

  cargar();
}

init();

// ➕ crear ticket
async function crear() {
  const txt = document.getElementById("txt").value;
  const file = document.getElementById("foto").files[0];

  let foto_url = null;

  if (file) {
    const nombre = Date.now() + "_" + file.name;

    await supabase.storage
      .from("imagenes")
      .upload(nombre, file);

    const { data } = supabase.storage
      .from("imagenes")
      .getPublicUrl(nombre);

    foto_url = data.publicUrl;
  }

  await supabase.from("tickets").insert([
    {
      descripcion: txt,
      user_email: user.email,
      estatus: "pendiente",
      foto_url
    }
  ]);

  cargar();
}

// 📥 cargar tickets
async function cargar() {
  let query = supabase
    .from("tickets")
    .select("*")
    .order("created_at", { ascending: false });

  if (!admin) {
    query = query.eq("user_email", user.email);
  }

  const { data } = await query;

  document.getElementById("lista").innerHTML =
    data.map(t => `
      <div class="card">
        <b>${t.descripcion}</b><br>
        👤 ${t.user_email}<br>
        📌 ${t.estatus}<br>
        ${t.foto_url ? `<img src="${t.foto_url}" width="100">` : ""}

        ${admin ? `
          <br>
          <select onchange="cambiar('${t.id}', this.value)">
            <option ${t.estatus==='pendiente'?'selected':''}>pendiente</option>
            <option ${t.estatus==='proceso'?'selected':''}>proceso</option>
            <option ${t.estatus==='terminado'?'selected':''}>terminado</option>
          </select>
        ` : ""}
      </div>
    `).join("");
}

// 🔄 cambiar estado (admin)
async function cambiar(id, estado) {
  await supabase
    .from("tickets")
    .update({ estatus: estado })
    .eq("id", id);

  cargar();
}

// 🚪 logout
async function logout() {
  await supabase.auth.signOut();
  window.location.href = "/yael-manzo/index.html";
}
</script>

</body>
</html>
