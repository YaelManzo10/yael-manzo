<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CEDAPSA Tickets</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}

.logo {
  width: 50px;
}

h1 {
  margin: 0;
}

.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

.estado {
  padding: 5px 10px;
  border-radius: 20px;
}

.pendiente { background: orange; }
.completado { background: green; }

hr {
  margin: 20px 0;
  border-color: #334155;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <!-- 🔥 CAMBIA ESTE LOGO SI QUIERES -->
    <img class="logo" src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png">
    <h1>CEDAPSA Tickets</h1>
  </div>

  <!-- LOGIN -->
  <div class="input-group">
    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">
  </div>

  <div class="input-group">
    <button onclick="registro()">Crear cuenta</button>
    <button onclick="login()">Entrar</button>
    <button onclick="logout()">Salir</button>
  </div>

  <hr>

  <!-- CREAR -->
  <div class="input-group">
    <input id="txt" placeholder="Describe el problema...">
    <button onclick="crear()">Crear Ticket</button>
  </div>

  <!-- LISTA -->
  <div id="lista"></div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://hovpsbjewyqoaobtxdie.supabase.co",
  "sb_publishable_LFWYygez_5LNBgO2uFYGUQ_FDxAkrRT"
);

// REGISTRO
async function registro() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      emailRedirectTo: "https://project-r3fu4.vercel.app"
    }
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Revisa tu correo para confirmar");
  }
}

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Bienvenido");
    cargar();
  }
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  alert("Sesión cerrada");
}

// CREAR TICKET
async function crear() {
  const txt = document.getElementById("txt").value;
  if (!txt) return;

  const { error } = await supabase.from("tickets").insert([
    { descripcion: txt }
  ]);

  if (error) alert(error.message);

  document.getElementById("txt").value = "";
  cargar();
}

// CARGAR
async function cargar() {
  const { data } = await supabase
    .from("tickets")
    .select("*")
    .order("created_at", { ascending: false });

  if (!data) return;

  document.getElementById("lista").innerHTML =
    data.map(t => `
      <div class="card">
        <div>${t.descripcion}</div>
        <div class="estado ${t.estatus}">${t.estatus}</div>
      </div>
    `).join("");
}

cargar();
</script>

</body>
</html>
