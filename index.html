<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CEDAPSA Maintenance</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #2563eb;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

.estado {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
}

.pendiente {
  background: #f59e0b;
}

.completado {
  background: #22c55e;
}
</style>
</head>

<body>

<div class="container">
  <h1>🛠️ CEDAPSA Maintenance</h1>

  <div class="input-group">
    <input id="txt" placeholder="Describe el problema...">
    <button onclick="crear()">Crear</button>
  </div>

  <div id="lista"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://hovpsbjewyqoaobtxdie.supabase.co",
  "TU_API_KEY_AQUI"
);

async function crear() {
  const txt = document.getElementById("txt").value;

  if (!txt) return;

  await supabase.from("tickets").insert([
    { descripcion: txt }
  ]);

  document.getElementById("txt").value = "";
  cargar();
}

async function cargar() {
  const { data } = await supabase
    .from("tickets")
    .select("*")
    .order("created_at", { ascending: false });

  document.getElementById("lista").innerHTML =
    data.map(t => `
      <div class="card">
        <div>${t.descripcion}</div>
        <div class="estado ${t.estatus}">${t.estatus}</div>
      </div>
    `).join("");
}

cargar();
</script>

</body>
</html>
