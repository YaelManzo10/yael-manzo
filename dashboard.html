<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CEDAPSA Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}

.header img {
  width: 50px;
}

.admin { background: #22c55e; padding: 5px 10px; border-radius: 10px; }
.user { background: #3b82f6; padding: 5px 10px; border-radius: 10px; }

.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://media.licdn.com/dms/image/v2/C4E0BAQHQU86COt-8pw/company-logo_200_200/company-logo_200_200/0/1630611831751/cedapsa_mx_logo?e=2147483647">
  <h2>CEDAPSA Tickets</h2>
  <span id="rol"></span>
</div>

<div class="input-group">
  <input id="txt" placeholder="Describe el problema...">
  <button onclick="crearTicket()">Crear Ticket</button>
</div>

<div id="tickets"></div>

<script>
const supabase = window.supabase.createClient(
  "TU_URL",
  "TU_API_KEY"
);

let usuarioActual = null;
let perfilActual = null;

// 🔐 Cargar usuario
async function iniciar() {

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  usuarioActual = user;

  const { data: perfil } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  perfilActual = perfil;

  if (perfil.rol === "admin") {
    document.getElementById("rol").innerHTML = '<span class="admin">ADMIN 👑</span>';
  } else {
    document.getElementById("rol").innerHTML = '<span class="user">USUARIO 👤</span>';
  }

  cargarTickets();
}

// 🎯 Crear ticket
async function crearTicket() {
  const txt = document.getElementById("txt").value;

  if (!txt) return;

  await supabase.from("tickets").insert([{
    descripcion: txt,
    user_id: usuarioActual.id
  }]);

  document.getElementById("txt").value = "";
  cargarTickets();
}

// 📊 Cargar tickets
async function cargarTickets() {

  let query = supabase
    .from("tickets")
    .select("*")
    .order("created_at", { ascending: false });

  // 👑 Admin ve TODO
  if (perfilActual.rol !== "admin") {
    query = query.eq("user_id", usuarioActual.id);
  }

  const { data } = await query;

  document.getElementById("tickets").innerHTML =
    data.map(t => `
      <div class="card">
        <div><b>${t.descripcion}</b></div>
        <div>Estado: ${t.estatus || "pendiente"}</div>
      </div>
    `).join("");
}

iniciar();
</script>

</body>
</html>
