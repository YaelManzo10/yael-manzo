<!DOCTYPE html>
<html>
<head>
  <title>CEDAPSA</title>
</head>
<body style="font-family: Arial; padding:20px;">

<h1>CEDAPSA Maintenance</h1>

<input id="txt" placeholder="Descripción">
<button onclick="crear()">Crear Ticket</button>

<hr>

<div id="lista"></div>

<script>
const URL = "https://hovpsbjewyqoaobtxdie.supabase.co/rest/v1/tickets";
const APIKEY = "sb_publishable_LFWYygez_5LNBgO2uFYGUQ_FDxAkrRT";

async function crear() {
  const txt = document.getElementById("txt").value;

  await fetch(URL, {
    method: "POST",
    headers: {
      "apikey": APIKEY,
      "Content-Type": "application/json",
      "Prefer": "return=minimal"
    },
    body: JSON.stringify({ descripcion: txt })
  });

  cargar();
}

async function cargar() {
  const res = await fetch(URL + "?select=*", {
    headers: {
      "apikey": APIKEY
    }
  });

  const data = await res.json();

  document.getElementById("lista").innerHTML =
    data.map(t => `<p>${t.descripcion} - ${t.estatus}</p>`).join("");
}

cargar();
</script>

</body>
</html>
