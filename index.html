<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CEDAPSA Maintenance</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="font-family: Arial; padding: 20px">

<h1>CEDAPSA Maintenance</h1>

<input id="txt" placeholder="Descripción">
<button onclick="crear()">Crear Ticket</button>

<hr>

<div id="lista"></div>

<script>
const supabase = window.supabase.createClient(
  "https://hovpsbjewyqaoobtxdie.supabase.co",
  "sb_publishable_LFWYygez_5LNBgO2uFYGUQ_FDxAkrRT"
);

// CREAR TICKET
async function crear() {
  const txt = document.getElementById("txt").value;

  if (!txt) {
    alert("Escribe una descripción");
    return;
  }

  const { error } = await supabase.from("Entradas").insert([
    { descripcion: txt }
  ]);

  if (error) {
    console.log("ERROR INSERT:", error);
    alert("Error al guardar");
    return;
  }

  document.getElementById("txt").value = "";
  cargar();
}

// CARGAR TICKETS
async function cargar() {
  const { data, error } = await supabase.from("Entradas").select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if (error) {
    alert("Error al cargar datos");
    return;
  }

  const contenedor = document.getElementById("lista");

  if (!data || data.length === 0) {
    contenedor.innerHTML = "<p>No hay tickets aún</p>";
    return;
  }

  contenedor.innerHTML =
    data.map(t => `<p>${t.descripcion} - ${t.estatus}</p>`).join("");
}

// INICIO
cargar();
</script>

</body>
</html>
