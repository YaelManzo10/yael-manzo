<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CEDAPSA</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; }
.card { background:#1e293b; padding:10px; margin:10px; border-radius:10px; }
button { margin:5px; }
img { max-width:100px; }
</style>
</head>

<body>

<h2>🏢 CEDAPSA PANEL</h2>
<div id="rol"></div>

<input id="txt" placeholder="Nuevo ticket">
<input type="file" id="foto">
<button onclick="crear()">Crear</button>

<div id="tickets"></div>

<script>
const supabase = window.supabase.createClient(
  "TU_URL",
  "TU_API_KEY"
);

let user, perfil;

async function init(){
  const { data:{ user:u } } = await supabase.auth.getUser();
  if(!u) location.href="index.html";

  user = u;

  const { data } = await supabase.from("profiles")
    .select("*").eq("id",user.id).single();

  perfil = data;

  document.getElementById("rol").innerText =
    perfil.rol === "admin" ? "ADMIN 👑" : "USUARIO 👤";

  cargar();
}

async function crear(){
  const txt = document.getElementById("txt").value;
  const file = document.getElementById("foto").files[0];

  let foto_url=null;

  if(file){
    const nombre = Date.now()+file.name;

    await supabase.storage.from("imagenes").upload(nombre,file);

    const { data } = supabase.storage
      .from("imagenes")
      .getPublicUrl(nombre);

    foto_url = data.publicUrl;
  }

  await supabase.from("tickets").insert([{
    descripcion: txt,
    user_id: user.id,
    foto_url
  }]);

  cargar();
}

async function cargar(){
  let query = supabase.from("tickets").select("*");

  if(perfil.rol !== "admin"){
    query = query.eq("user_id", user.id);
  }

  const { data } = await query;

  document.getElementById("tickets").innerHTML =
    data.map(t=>`
      <div class="card">
        <b>${t.descripcion}</b><br>
        Estado: ${t.estatus}<br>
        ${t.foto_url ? `<img src="${t.foto_url}">` : ""}

        ${perfil.rol==="admin"?`
          <button onclick="estado('${t.id}','proceso')">Proceso</button>
          <button onclick="estado('${t.id}','cerrado')">Cerrar</button>
        `:""}
      </div>
    `).join("");
}

async function estado(id,e){
  await supabase.from("tickets")
    .update({estatus:e})
    .eq("id",id);

  cargar();
}

init();
</script>

</body>
</html>
