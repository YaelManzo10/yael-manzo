<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CEDAPSA Tickets</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 40px;
}
input {
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  width: 250px;
}
button {
  padding: 12px 20px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🛠️ CEDAPSA Tickets</h1>

<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">

<br>

<button onclick="signup()">Crear cuenta</button>
<button onclick="login()">Entrar</button>

<script>
const SUPABASE_URL = "https://TU_PROYECTO.supabase.co";
const SUPABASE_KEY = "TU_API_KEY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function signup() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  const { error } = await supabase.auth.signUp({
    email,
    password: pass
  });

  if (error) alert(error.message);
  else alert("Revisa tu correo para confirmar");
}

async function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password: pass
  });

  if (error) {
    alert(error.message);
  } else {
    window.location.href = "/yael-manzo/dashboard.html";
  }
}
</script>

</body>
</html>
